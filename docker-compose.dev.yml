version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: vtuber_meikan_db_dev
    environment:
      POSTGRES_DB: vtuber_meikan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vtuber_meikan_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

  app:
    build: .
    container_name: vtuber_meikan_app_dev
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vtuber_meikan
      DB_USER: postgres
      DB_PASSWORD: password
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data_dev:
  pgadmin_data_dev:
